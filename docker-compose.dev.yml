version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: cnk_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123123"
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - cnk_pgdata:/var/lib/postgresql/data

volumes:
  cnk_pgdata:
